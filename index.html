<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>어린이 모션 놀이터</title>
<meta name="theme-color" content="#FFF3B0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Pretendard',sans-serif;color:#3d2b1f;
  background:linear-gradient(160deg,#FFF3B0 0%,#FFD6E8 45%,#BEE3F8 100%);
  user-select:none;-webkit-user-select:none;touch-action:manipulation;word-break:keep-all;
  overscroll-behavior:none;}
button{font-family:inherit;border:none;cursor:pointer;}

#stage{position:fixed;inset:0;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);filter:brightness(.92) saturate(1.05);}
video.rear{transform:none;}
canvas#cv{position:absolute;inset:0;width:100%;height:100%;}
#vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(255,214,232,.3) 100%);}

.screen{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:22px;background:linear-gradient(160deg,#FFF3B0 0%,#FFD6E8 45%,#BEE3F8 100%);overflow-y:auto;}
.screen.show{display:flex;}

.mascot{width:120px;height:120px;filter:drop-shadow(0 10px 18px rgba(120,80,40,.25));animation:bob 2.4s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}

.big-btn{background:linear-gradient(160deg,#FF9DB0,#FF6F91);color:#fff;border-radius:34px;padding:22px 52px;
  font-size:26px;font-weight:900;box-shadow:0 10px 0 #E0506F,0 16px 26px rgba(255,111,145,.4);min-height:78px;}
.big-btn:active{transform:translateY(6px);box-shadow:0 4px 0 #E0506F,0 8px 16px rgba(255,111,145,.35);}
.ghost-btn{background:#fff;color:#7a5a3a;border:3px solid #FFDCA8;border-radius:28px;padding:16px 34px;
  font-size:19px;font-weight:800;min-height:62px;box-shadow:0 6px 0 #FFDCA8;}
.ghost-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #FFDCA8;}
.btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}

#hubScr{justify-content:flex-start;padding:0;}
.hub-in{max-width:560px;margin:0 auto;padding:28px 18px 30px;width:100%;}
.hub-title{font-size:clamp(28px,8vw,42px);font-weight:900;text-align:center;color:#7a3d5e;text-shadow:2px 2px 0 #fff;}
.hub-sub{text-align:center;font-size:15px;color:#8a6a4a;margin:10px 0 24px;line-height:1.6;font-weight:700;}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.gcard{position:relative;background:#fff;border-radius:28px;padding:20px 14px 16px;text-align:center;
  box-shadow:0 8px 0 var(--sh,#E8D3A0),0 14px 20px rgba(120,90,40,.14);border:4px solid var(--bd,#FFE8B8);}
.gcard:active{transform:translateY(5px);box-shadow:0 3px 0 var(--sh,#E8D3A0);}
.gcard .gicon{font-size:52px;line-height:1;filter:drop-shadow(0 6px 6px rgba(0,0,0,.12));}
.gcard .gname{font-size:17px;font-weight:900;margin-top:8px;color:#5c3a24;}
.gcard .gdesc{font-size:11.5px;color:#a08560;margin-top:4px;font-weight:700;}
.hub-foot{text-align:center;margin-top:26px;font-size:11px;color:#b09570;line-height:1.8;}
.hub-foot .insta{display:inline-flex;align-items:center;gap:6px;margin-top:8px;color:#c96a9a;text-decoration:none;font-weight:800;
  background:#fff;border-radius:99px;padding:8px 16px;border:2px solid #FFD6E8;}

#introScr .gtitle{font-size:clamp(26px,7.5vw,36px);font-weight:900;margin:14px 0 8px;color:#7a3d5e;}
#introScr .gdesc2{font-size:16px;color:#8a6a4a;line-height:1.8;max-width:380px;font-weight:700;margin-bottom:6px;}
#loadMsg{margin-top:12px;font-size:13px;color:#b09570;font-weight:700;min-height:1.2em;max-width:340px;}

#hudTop{position:absolute;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top) + 12px) 14px 0;display:none;
  justify-content:space-between;align-items:flex-start;z-index:6;gap:8px;}
#hudTop.show{display:flex;}
.hbtn{display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.9);color:#7a5a3a;
  border-radius:16px;padding:0 14px;font-size:13px;font-weight:900;box-shadow:0 4px 0 #FFDCA8;
  min-height:44px;white-space:nowrap;}
.hbtn.show{display:inline-flex;}
.hud-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
#depthWrap{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 76px);
  width:min(70vw,300px);height:14px;border-radius:99px;background:rgba(255,255,255,.5);overflow:hidden;z-index:6;
  border:2px solid #fff;display:none;}
#depthWrap.show{display:block;}
#depthBar{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#FF9DB0,#a3e635);transition:width .08s linear;}
#bigCounter{position:absolute;top:calc(env(safe-area-inset-top) + 66px);left:50%;transform:translateX(-50%);z-index:6;display:none;
  background:rgba(255,255,255,.92);border-radius:26px;padding:8px 26px;box-shadow:0 6px 0 #FFDCA8;text-align:center;}
#bigCounter.show{display:block;}
#cNum{font-size:40px;font-weight:900;color:#FF6F91;line-height:1;font-variant-numeric:tabular-nums;}
#cNum.pop{animation:pop .3s cubic-bezier(.2,1.7,.4,1);}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.28);}100%{transform:scale(1);}}
#cLbl{font-size:10.5px;font-weight:800;color:#c98a3a;letter-spacing:1.5px;margin-top:1px;}
#timerChip{position:absolute;top:calc(env(safe-area-inset-top) + 66px);right:14px;z-index:6;display:none;text-align:center;
  background:rgba(255,255,255,.92);border-radius:20px;padding:7px 16px;box-shadow:0 5px 0 #FFDCA8;}
#timerChip.show{display:block;}
#timerVal{font-size:26px;font-weight:900;color:#7a3d5e;font-variant-numeric:tabular-nums;}
#stateTxt{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 16%);
  max-width:92vw;text-align:center;font-size:min(6vw,24px);font-weight:900;z-index:6;color:#7a3d5e;
  background:rgba(255,255,255,.9);border-radius:20px;padding:11px 20px;box-shadow:0 6px 0 #FFDCA8;line-height:1.4;}
#stateTxt:empty{display:none;}
#countdown{position:absolute;inset:0;z-index:18;display:none;align-items:center;justify-content:center;
  background:rgba(255,243,176,.85);font-size:min(40vw,180px);font-weight:900;color:#FF6F91;text-shadow:3px 3px 0 #fff;}

#resultScr .stars{font-size:44px;margin-bottom:10px;letter-spacing:6px;}
#resultScr .rnum{font-size:min(22vw,88px);font-weight:900;color:#FF6F91;text-shadow:3px 3px 0 #fff;line-height:1;}
#resultScr .rsub{font-size:19px;font-weight:800;color:#7a3d5e;margin-top:8px;}

@media (prefers-reduced-motion:reduce){ .mascot,#cNum.pop{animation:none;} }

/* ---------- 자세 분석 리포트 ---------- */
#reportScr{display:none;position:absolute;inset:0;z-index:22;background:#FFF8E9;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#reportScr.show{display:block;}
.rp-in{max-width:560px;margin:0 auto;padding:26px 18px 40px;}
.rp-in h2{font-size:24px;font-weight:900;text-align:center;color:#7a3d5e;}
.rp-date{text-align:center;font-size:11.5px;color:#a08560;margin:6px 0 18px;font-weight:700;}
.score-wrap{display:flex;align-items:center;justify-content:center;gap:18px;margin:4px 0 18px;}
.score-ring{width:112px;height:112px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--c,#a3e635) calc(var(--p)*1%), rgba(148,163,184,.2) 0);
  filter:drop-shadow(0 6px 10px rgba(120,90,40,.18));}
.score-ring span{width:84px;height:84px;border-radius:50%;background:#FFF8E9;display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:900;color:#5c3a24;}
.score-side{text-align:left;min-width:0;}
.sc-band{font-size:16px;font-weight:900;}
.sc-rel{font-size:11.5px;color:#a08560;margin-top:6px;line-height:1.55;font-weight:700;}
.type-badge{display:inline-flex;align-items:center;gap:8px;background:#fff;border:2px solid #C7E8FF;
  border-radius:99px;padding:9px 18px;font-size:14.5px;font-weight:900;color:#4a7a9a;margin:2px 0 12px;}
.quality-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.q-chip{font-size:10.5px;font-weight:700;color:#7a5a3a;background:#fff;border:1px solid #FFDCA8;
  border-radius:99px;padding:5px 11px;}
.narrative{font-size:13px;color:#5c3a24;line-height:1.85;background:#fff;border-radius:14px;
  padding:14px 16px;margin-bottom:16px;text-align:left;font-weight:600;border:2px solid #FFE8B8;}
.rp-snaps{display:flex;gap:10px;margin-bottom:16px;}
.rp-snaps figure{flex:1;min-width:0;}
.rp-snaps img{width:100%;border-radius:14px;border:2px solid #FFE8B8;display:block;}
.rp-snaps figcaption{font-size:11px;color:#a08560;text-align:center;margin-top:5px;font-weight:700;}
.rp-summary{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
.sm-chip{border-radius:99px;padding:8px 16px;font-size:13px;font-weight:900;}
.g0{background:#E8F7D6;color:#5a8a2a;border:1px solid #c3e8a0;}
.g1{background:#FFF3C2;color:#a8780a;border:1px solid #ffe08a;}
.g2{background:#FFDCE0;color:#c8506a;border:1px solid #ffb8c4;}
.rp-sec{font-size:12px;font-weight:900;letter-spacing:2px;color:#a08560;margin:22px 2px 10px;}
.m-card{background:#fff;border:2px solid #FFE8B8;border-radius:16px;padding:14px 15px;margin-bottom:10px;text-align:left;}
.m-top{display:flex;align-items:center;gap:9px;}
.m-top .ic{font-size:20px;}
.m-top .nm{font-size:15px;font-weight:900;flex:1;color:#5c3a24;}
.m-chip{border-radius:99px;padding:5px 12px;font-size:11.5px;font-weight:900;white-space:nowrap;}
.m-val{font-size:13px;color:#7a5a3a;margin:8px 0 7px;font-weight:800;}
.m-val b{color:#5c3a24;font-size:15px;}
.m-gauge{height:7px;border-radius:99px;background:#FFF3D6;overflow:hidden;margin-bottom:8px;}
.m-gauge i{display:block;height:100%;border-radius:99px;}
.m-desc{font-size:12px;color:#a08560;line-height:1.65;font-weight:600;}
.rx-card{background:#fff;border:2px solid #C7E8FF;border-radius:16px;padding:14px 15px;margin-bottom:10px;text-align:left;}
.rx-card .rt{font-size:14.5px;font-weight:900;display:flex;align-items:center;gap:8px;color:#4a7a9a;}
.rx-card .rh{font-size:12px;color:#7a5a3a;line-height:1.7;margin:7px 0;font-weight:600;}
.rx-card .rd{font-size:12px;font-weight:800;color:#5a8a2a;}
.rx-go{margin-top:9px;background:#eef8ff;border:2px solid #8FC4E8;color:#3a6a8a;
  border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:800;min-height:38px;}
.rp-warn{margin-top:18px;font-size:11px;color:#a08560;background:#fff;border:1px solid #FFE8B8;
  border-radius:12px;padding:12px 14px;line-height:1.7;text-align:left;font-weight:600;}
.rp-btns{display:flex;gap:12px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
</style>
</head>
<body>

<div id="stage">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>
  <div id="vignette"></div>

  <div id="hudTop">
    <button class="hbtn show" id="homeBtn">🏠 처음</button>
    <div class="hud-btns">
      <button class="hbtn" id="flipBtn">🔄 화면전환</button>
      <button class="hbtn" id="viewBtn">전체 보기</button>
      <button class="hbtn" id="endBtn">그만할래요</button>
    </div>
  </div>
  <div id="bigCounter"><div id="cNum">0</div><div id="cLbl">개</div></div>
  <div id="timerChip"><div id="timerVal">25</div></div>
  <div id="depthWrap"><div id="depthBar"></div></div>
  <div id="stateTxt"></div>
  <div id="countdown">3</div>

  <!-- 허브 -->
  <div id="hubScr" class="screen show">
    <div class="hub-in">
      <div class="hub-title">🐻 어린이 모션 놀이터</div>
      <div class="hub-sub">카메라 앞에 서서 몸으로 놀아요!<br>어른과 함께 2~3걸음 뒤로 물러나 주세요 🙆</div>
      <div class="game-grid">
        <button class="gcard" data-g="squat" style="--bd:#C7E8FF;--sh:#8FC4E8"><div class="gicon">🐻</div><div class="gname">앉았다 일어나기</div><div class="gdesc">쑥 앉았다 쑤욱!</div></button>
        <button class="gcard" data-g="jacks" style="--bd:#FFD1DC;--sh:#F0A8B8"><div class="gicon">🙌</div><div class="gname">만세 체조</div><div class="gdesc">팔 벌려 번쩍!</div></button>
        <button class="gcard" data-g="mole" style="--bd:#FFE39A;--sh:#E0BE5E"><div class="gicon">🐹</div><div class="gname">두더지 콩</div><div class="gdesc">빼꼼! 손으로 콩</div></button>
        <button class="gcard" data-g="sequence" style="--bd:#FFD9D9;--sh:#E89A9A"><div class="gicon">🔢</div><div class="gname">순서대로 콕</div><div class="gdesc">1→2→3→4 순서로 콕!</div></button>
        <button class="gcard" data-g="tissue" style="--bd:#FFE0F0;--sh:#E8A8C8"><div class="gicon">🧻</div><div class="gname">휴지 뽑기</div><div class="gdesc">위로 휙휙!</div></button>
        <button class="gcard" data-g="wipe" style="--bd:#CFEFEF;--sh:#8FCFCF"><div class="gicon">🧽</div><div class="gname">칠판 지우기</div><div class="gdesc">쓱쓱 깨끗하게</div></button>
        <button class="gcard" data-g="hammer" style="--bd:#FFE3C2;--sh:#E0AD70"><div class="gicon">🔨</div><div class="gname">콩콩 못박기</div><div class="gdesc">콩콩 두드려요</div></button>
        <button class="gcard" data-g="numquiz" style="--bd:#FFEFC2;--sh:#E0C86F"><div class="gicon">🔢</div><div class="gname">숫자 콕콕</div><div class="gdesc">10까지 세어봐요</div></button>
        <button class="gcard" data-g="engword" style="--bd:#D6F5D6;--sh:#93D693"><div class="gicon">🐶</div><div class="gname">영어 콕콕</div><div class="gdesc">그림 보고 골라요</div></button>
        <button class="gcard" data-g="mosquito" style="--bd:#D6F5D6;--sh:#93D693"><div class="gicon">🦟</div><div class="gname">모기 잡기</div><div class="gdesc">짝! 박수로 잡아요</div></button>
        <button class="gcard" data-g="flex" style="--bd:#E5D4FF;--sh:#B79AE8"><div class="gicon">🙇</div><div class="gname">땅 짚기</div><div class="gdesc">손이 땅에 닿게 쭈욱!</div></button>
        <button class="gcard" data-g="balance" style="--bd:#FFE9C2;--sh:#E0B25E"><div class="gicon">🦩</div><div class="gname">한발 균형</div><div class="gdesc">한 발로 오래 서봐요</div></button>
        <button class="gcard wide" data-g="posture" style="--bd:#C7E8FF;--sh:#8FC4E8;grid-column:1/-1"><div class="gicon">🧍</div><div class="gname">자세 분석</div><div class="gdesc">정면·측면을 스캔해서 자세 점수와 운동 처방을 알려줘요</div></button>
      </div>
      <div class="hub-foot">🔒 영상은 저장되지 않고 기기 안에서만 사용돼요<br>
        <a class="insta" href="https://www.instagram.com/kimju.zip" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="0.7" fill="currentColor" stroke="none"/></svg>
          kimju.zip</a></div>
    </div>
  </div>

  <!-- 인트로 -->
  <div id="introScr" class="screen">
    <svg class="mascot" id="introMascot" viewBox="0 0 120 120"></svg>
    <div class="gtitle" id="introTitle"></div>
    <p class="gdesc2" id="introDesc"></p>
    <div class="btn-row" style="margin-top:20px">
      <button class="ghost-btn" id="introBack">← 놀이터로</button>
      <button class="big-btn" id="introStart">시작!</button>
    </div>
    <div id="loadMsg"></div>
  </div>

  <!-- 결과 -->
  <div id="resultScr" class="screen">
    <svg class="mascot" id="resultMascot" viewBox="0 0 120 120"></svg>
    <div class="stars">⭐⭐⭐</div>
    <div class="rnum" id="resNum">0</div>
    <div class="rsub" id="resSub"></div>
    <div class="btn-row" style="margin-top:26px">
      <button class="ghost-btn" id="resHomeBtn">🏠 놀이터로</button>
      <button class="big-btn" id="resAgainBtn">또 할래요!</button>
    </div>
  </div>

  <!-- 자세 분석 리포트 -->
  <div id="reportScr"><div class="rp-in" id="reportBody"></div></div>
</div>

<script type="module">
import { FilesetResolver, PoseLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const DEBUG=params.get('debug')==='1';

/* ---------- 마스코트(곰돌이) ---------- */
const BEAR='<g>'
  +'<circle cx="24" cy="30" r="15" fill="#D9A066"/><circle cx="96" cy="30" r="15" fill="#D9A066"/>'
  +'<circle cx="24" cy="30" r="7.5" fill="#F7DDBB"/><circle cx="96" cy="30" r="7.5" fill="#F7DDBB"/>'
  +'<circle cx="60" cy="62" r="44" fill="#E4B27C"/>'
  +'<ellipse cx="38" cy="72" rx="10" ry="7" fill="#F5A9C4" opacity="0.55"/><ellipse cx="82" cy="72" rx="10" ry="7" fill="#F5A9C4" opacity="0.55"/>'
  +'<ellipse cx="60" cy="70" rx="22" ry="17" fill="#F7DDBB"/>'
  +'<circle cx="47" cy="56" r="5.5" fill="#3d2b1f"/><circle cx="73" cy="56" r="5.5" fill="#3d2b1f"/>'
  +'<circle cx="48.8" cy="54" r="1.7" fill="#fff"/><circle cx="74.8" cy="54" r="1.7" fill="#fff"/>'
  +'<ellipse cx="60" cy="68" rx="6" ry="4.2" fill="#3d2b1f"/>'
  +'<path d="M60,71.5 Q60,77 53,79 M60,71.5 Q60,77 67,79" stroke="#3d2b1f" stroke-width="2.6" fill="none" stroke-linecap="round"/>'
  +'</g>';
$('introMascot').innerHTML=BEAR; $('resultMascot').innerHTML=BEAR;

/* ---------- 음성 안내(TTS) ---------- */
function primeVoices(){ try{ speechSynthesis.getVoices(); }catch(e){} }
primeVoices();
if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=primeVoices;
function say(text){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=/[A-Za-z]/.test(text)&&!/[가-힣]/.test(text)?'en-US':'ko-KR';
    u.rate=0.92; u.pitch=1.25;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- 사운드 ---------- */
let actx=null;
function initAudio(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
function beep(freq,dur,vol){
  if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='sine'; o.frequency.value=freq||660;
  g.gain.value=0; o.connect(g); g.connect(actx.destination);
  const t=actx.currentTime;
  g.gain.linearRampToValueAtTime(vol||0.22,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,t+(dur||0.2));
  o.start(t); o.stop(t+(dur||0.2)+0.02);
}
function cheer(){ beep(660,0.12); setTimeout(()=>beep(880,0.14),110); setTimeout(()=>beep(1046,0.22),220); }
function buzz(p){ try{ navigator.vibrate&&navigator.vibrate(p); }catch(e){} }

/* ============================================================
   공용 코어: 카메라·좌표계 (스쿼트코치와 동일 검증 로직)
   ============================================================ */
const video=$('cam'), canvas=$('cv'), ctx=canvas.getContext('2d');
let pose=null, fileset=null, camOn=false, facing='user', lastVideoTime=-1;
const map={s:1,ox:0,oy:0,W:0,H:0,vw:720,vh:1280,mode:'contain'};
let viewPref='contain';
try{ viewPref=localStorage.getItem('kp_view')||'contain'; }catch(e){}
function updateMap(){
  const W=innerWidth||375, H=innerHeight||812;
  const vw=(camOn&&video.videoWidth)?video.videoWidth:720;
  const vh=(camOn&&video.videoHeight)?video.videoHeight:1280;
  const vA=vw/vh, sA=W/H;
  const mismatch=Math.max(vA/sA,sA/vA);
  const mode=(viewPref==='contain')?'contain':(mismatch>1.12?'contain':'cover');
  const s=mode==='contain'?Math.min(W/vw,H/vh):Math.max(W/vw,H/vh);
  map.s=s; map.ox=(W-vw*s)/2; map.oy=(H-vh*s)/2; map.W=W; map.H=H; map.vw=vw; map.vh=vh; map.mode=mode;
  canvas.width=W; canvas.height=H;
  if(camOn) video.style.objectFit=mode;
  const vb=$('viewBtn'); if(vb) vb.textContent=(mode==='contain')?'꽉 채우기':'전체 보기';
}
addEventListener('resize',updateMap); updateMap();
function toPx(l){
  let x=l.x*map.vw*map.s+map.ox;
  const y=l.y*map.vh*map.s+map.oy;
  if(facing==='user') x=map.W-x;
  return {x,y};
}
function visOf(l){ return (l&&l.visibility!=null)?l.visibility:1; }
function angle(a,b,c){
  const v1={x:a.x-b.x,y:a.y-b.y}, v2={x:c.x-b.x,y:c.y-b.y};
  const dot=v1.x*v2.x+v1.y*v2.y, m=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
  if(!m) return 180;
  return Math.acos(Math.max(-1,Math.min(1,dot/m)))*180/Math.PI;
}
async function loadModels(){
  if(pose||DEBUG) return;
  $('loadMsg').textContent='준비하는 중… (처음엔 조금 걸려요)';
  fileset=fileset||await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  pose=await PoseLandmarker.createFromOptions(fileset,{
    baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task',delegate:'GPU'},
    runningMode:'VIDEO',numPoses:1,minPoseDetectionConfidence:0.3,minPosePresenceConfidence:0.3,minTrackingConfidence:0.3
  });
}
async function startCam(){
  if(DEBUG){ camOn=true; updateMap(); return; }
  if(camOn&&video.srcObject) return;
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}},audio:false});
  video.srcObject=stream;
  video.classList.toggle('rear',facing==='environment');
  await new Promise(r=>video.onloadedmetadata=r);
  await video.play();
  camOn=true; updateMap();
}
function stopCam(){ const s=video.srcObject; if(s) s.getTracks().forEach(t=>t.stop()); video.srcObject=null; camOn=false; }

function drawPose(lms,col){
  col=col||'#FF9DB0';
  const BONES=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
  ctx.lineWidth=Math.max(4,map.W/110); ctx.lineCap='round'; ctx.strokeStyle=col; ctx.shadowBlur=14; ctx.shadowColor=col;
  BONES.forEach(([a,b])=>{ if(visOf(lms[a])<0.2||visOf(lms[b])<0.2) return;
    const A=toPx(lms[a]),B=toPx(lms[b]); ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke(); });
  ctx.shadowBlur=0; ctx.fillStyle='#fff';
  [0,11,12,15,16,23,24,25,26].forEach(i=>{ if(visOf(lms[i])<0.2) return; const P=toPx(lms[i]);
    ctx.beginPath(); ctx.arc(P.x,P.y,Math.max(5,map.W/90),0,Math.PI*2); ctx.fill(); });
}
function setState(t){ $('stateTxt').textContent=t||''; }

/* ---------- 손 추적(스쿼트코치 hands2 동일: 4점 평균+속도, 세그먼트 히트) ---------- */
let handTrack={L:null,R:null};
function hands2(lms){
  const now=performance.now(), out=[];
  [['L',15,19,17,21],['R',16,20,18,22]].forEach(arr=>{
    const k=arr[0];
    const pts=arr.slice(1).filter(i=>lms[i]&&visOf(lms[i])>0.3).map(i=>toPx(lms[i]));
    if(!pts.length){ handTrack[k]=null; return; }
    const x=pts.reduce((s,p)=>s+p.x,0)/pts.length, y=pts.reduce((s,p)=>s+p.y,0)/pts.length;
    const prev=handTrack[k];
    const dt=prev?Math.max(16,now-prev.t):16;
    const h={x,y,px:prev?prev.x:x,py:prev?prev.y:y,vx:prev?(x-prev.x)/dt*1000:0,vy:prev?(y-prev.y)/dt*1000:0,spd:0,t:now};
    h.spd=Math.hypot(h.vx,h.vy);
    handTrack[k]=h; out.push(h);
  });
  return out;
}
function segHit(h,cx,cy,r){
  const dx=h.x-h.px, dy=h.y-h.py, L2=dx*dx+dy*dy;
  if(L2<1) return Math.hypot(h.x-cx,h.y-cy)<r;
  let t=((cx-h.px)*dx+(cy-h.py)*dy)/L2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(h.px+dx*t-cx,h.py+dy*t-cy)<r;
}
function anySegHit(hs,cx,cy,r){ return hs.some(h=>segHit(h,cx,cy,r)); }
function anyNear(hs,cx,cy,r){ return hs.some(h=>Math.hypot(h.x-cx,h.y-cy)<r); }
function drawHandGlow(pts,col){
  ctx.save(); ctx.shadowBlur=20; ctx.shadowColor=col||'#FF9DB0';
  pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(12,map.W/30),0,Math.PI*2);
    ctx.fillStyle='rgba(255,157,176,.3)'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(6,map.W/64),0,Math.PI*2); ctx.fillStyle='#fff7f0'; ctx.fill(); });
  ctx.restore();
}
function randPos(r,avoid){
  for(let t=0;t<40;t++){
    const x=r+20+Math.random()*(map.W-2*(r+20));
    const y=map.H*0.14+r+Math.random()*(map.H*0.5-2*r);
    if(!avoid||avoid.every(a=>Math.hypot(a.x-x,a.y-y)>a.d)) return {x,y};
  }
  return {x:map.W/2,y:map.H*0.32};
}
function rrCtx(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x,y,w,h,r); else ctx.rect(x,y,w,h); }

function show(id){ ['hubScr','introScr','resultScr'].forEach(s=>$(s).classList.toggle('show',s===id)); $('reportScr').classList.remove('show'); }

/* ============================================================
   게임 정의 (스쿼트코치 검증 로직 이식 + 유아용 UI/난이도)
   ============================================================ */
const GAME={};
const DUR=25; // 초 — 유아 집중시간 고려, 짧게

/* ---------- 공통 카운터형(앉았다일어나기·만세체조) ---------- */
function makeCounter(cfg){
  const S={reps:0,lastRepAt:0,lostFrames:0};
  return {
    key:cfg.key, hud:{counter:true,end:true,depth:!!cfg.depth},
    start(){ S.reps=0; S.lastRepAt=0; S.lostFrames=0; cfg.reset(S); $('cNum').textContent='0'; $('cLbl').textContent='번'; },
    end(){
      if(S.reps<=0){ showResult({num:0,sub:'다음에 또 도전해봐요! '+cfg.emoji,voice:'다음에 또 도전해봐요!'}); return; }
      showResult({num:S.reps,sub:'번 했어요! '+cfg.emoji,voice:S.reps+'번 했어요! 정말 잘했어요!'});
    },
    frame(lms){
      if(!lms){ S.lostFrames++; setState('전신이 보이게 서 주세요 🙂'); return; }
      const core=[11,12,23,24]; let sum=0; core.forEach(i=>sum+=visOf(lms[i]));
      if(sum/core.length<0.45){ setState('몸이 잘 안 보여요, 조금 물러나요'); return; }
      drawPose(lms,cfg.color);
      cfg.judge(S,lms);
    },
    _rep(msg){
      const now=performance.now();
      if(now-S.lastRepAt<cfg.debounce) return false;
      S.reps++; S.lastRepAt=now;
      const n=$('cNum'); n.textContent=S.reps; n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
      beep(700+Math.min(300,S.reps*20),0.12); buzz(35);
      setState(msg||(S.reps+'번! 참 잘해요'));
      return true;
    },
    _S:S
  };
}

/* ---------- 🐻 앉았다 일어나기(스쿼트) ---------- */
GAME.squat=(()=>{
  const st={phase:'up',kneeEMA:null,wentDeep:false};
  const DOWN_A=118, UP_A=152; // 유아용: 스쿼트코치보다 살짝 완화(112→118)
  function kneeAngleOf(lms){
    let bst=null;
    for(const [h,k,a] of [[23,25,27],[24,26,28]]){
      const vh=visOf(lms[h]),vk=visOf(lms[k]),va=visOf(lms[a]);
      if(vh<0.4||vk<0.4) continue;
      if(va>=0.15){ const ang=angle(lms[h],lms[k],lms[a]), score=Math.min(vh,vk,va)+1; if(!bst||score>bst.score) bst={ang,score}; }
      else{ const dx=lms[k].x-lms[h].x, dy=lms[k].y-lms[h].y;
        const tilt=Math.atan2(Math.abs(dx),Math.max(dy,0.0001))*180/Math.PI;
        const ang=Math.max(85,175-tilt*0.95), score=Math.min(vh,vk); if(!bst||score>bst.score) bst={ang,score}; }
    }
    return bst;
  }
  const c=makeCounter({
    key:'squat',color:'#8FC4E8',emoji:'🐻',debounce:650,
    reset(){ st.phase='up'; st.kneeEMA=null; st.wentDeep=false; },
    judge(S,lms){
      const r=kneeAngleOf(lms);
      if(!r){ setState('엉덩이랑 무릎이 보이게 서봐요','#fbbf24'); $('depthBar').style.width='0%'; return; }
      st.kneeEMA=(st.kneeEMA==null)?r.ang:(st.kneeEMA*0.5+r.ang*0.5);
      const knee=st.kneeEMA;
      const depth=Math.max(0,Math.min(1,(165-knee)/(165-DOWN_A)));
      $('depthBar').style.width=(depth*100)+'%';
      if(st.phase==='up'){
        if(knee<DOWN_A){ st.phase='down'; st.wentDeep=true; setState('좋아요! 이제 일어나요 🐻'); }
        else setState('곰처럼 쑥 앉아봐요');
      }else if(knee>UP_A){ if(st.wentDeep) c._rep(); st.phase='up'; st.wentDeep=false; }
    }
  });
  c.intro={title:'앉았다 일어나기 🐻',desc:'곰돌이처럼 <b>쑥 앉았다가 쑤욱 일어나요!</b><br>몇 번이나 할 수 있을까요? 그만할 땐 "그만할래요"를 눌러요.'};
  return c;
})();

/* ---------- 🙌 만세 체조 ---------- */
GAME.jacks=(()=>{
  const st={pose:'down'};
  const c=makeCounter({
    key:'jacks',color:'#FF9DB0',emoji:'🙌',debounce:450,
    reset(){ st.pose='down'; },
    judge(S,lms){
      if(visOf(lms[15])<0.35||visOf(lms[16])<0.35){ setState('양손이 잘 보이게 해줘요'); return; }
      const headY=Math.min(visOf(lms[7])>0.3?lms[7].y:1, visOf(lms[8])>0.3?lms[8].y:1, lms[0]?lms[0].y:1);
      const up=lms[15].y<headY&&lms[16].y<headY;
      const down=lms[15].y>lms[11].y&&lms[16].y>lms[12].y;
      if(st.pose==='down'&&up){ st.pose='up'; }
      else if(st.pose==='up'&&down){ st.pose='down'; c._rep(S.reps+1+'번 만세! 🙌'); }
      else if(!up&&!down) setState('팔을 위로 번쩍 들어봐요');
    }
  });
  c.intro={title:'만세 체조 🙌',desc:'양팔을 <b>번쩍 만세!</b>하고 다시 내려요.<br>몇 번이나 할 수 있을까요?'};
  return c;
})();

/* ---------- 🐹 두더지 콩(느긋한 버전) ---------- */
GAME.mole=(()=>{
  const G={};
  function spawn(){
    const r=Math.max(52,Math.min(map.W,map.H)/7);
    const p=randPos(r,G.mole?[{x:G.mole.x,y:G.mole.y,d:r*2.2}]:null);
    G.mole={x:p.x,y:p.y,r,born:performance.now(),life:Math.max(1500,2300-G.score*10),lock:true};
  }
  return {
    key:'mole', hud:{counter:true,timer:true,end:true},
    intro:{title:'두더지 콩 🐹',desc:'빼꼼 나오는 두더지를 <b>손으로 콩!</b> 쳐봐요.<br>25초 동안 몇 마리나 잡을까요?'},
    start(){ G.score=0; G.mole=null; G.endAt=performance.now()+DUR*1000;
      $('cNum').textContent='0'; $('cLbl').textContent='마리'; say('두더지가 나오면 손으로 콩 쳐봐요!'); spawn(); },
    end(){ this.finish(); },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      let hands=[];
      if(lms){ drawPose(lms,'#E0BE5E'); hands=hands2(lms); drawHandGlow(hands,'#E0BE5E'); } else setState('몸이 보여야 잡을 수 있어요!');
      const m=G.mole, age=now-m.born;
      if(age>m.life){ setState('다음 두더지 빼꼼! 🐹'); spawn(); }
      else{
        const k=Math.min(1,age/220);
        ctx.font=Math.max(46,m.r*1.5)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.save(); ctx.translate(m.x,m.y+m.r*(1-k)*0.7); ctx.fillText('🐹',0,0); ctx.restore();
        if(hands.length){
          const near=anyNear(hands,m.x,m.y,m.r+16);
          if(m.lock){ if(!near) m.lock=false; }
          else if(anySegHit(hands,m.x,m.y,m.r+16)){
            G.score++; $('cNum').textContent=G.score;
            const n=$('cNum'); n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
            beep(700+Math.min(300,G.score*15),0.1); buzz(35); setState(G.score+'마리 잡았어요! 🐹'); spawn();
          }
        }
      }
    },
    finish(){ showResult({num:G.score,sub:'마리 잡았어요! 🐹',voice:G.score+'마리 잡았어요! 정말 빨라요!'}); }
  };
})();

/* ---------- 🔢 순서대로 콕 (넘버 헌터) ---------- */
GAME.sequence=(()=>{
  const G={};
  const N=4;
  const COLS={1:'#FF9DB0',2:'#8FC4E8',3:'#E0C86F',4:'#93D693'};
  function layout(){
    const r=Math.max(46,Math.min(map.W,map.H)/8);
    const pts=[];
    for(let i=0;i<N;i++){ const p=randPos(r,pts.map(q=>({x:q.x,y:q.y,d:r*2.6}))); pts.push({x:p.x,y:p.y,r,n:i+1,done:false,lock:true}); }
    return pts;
  }
  return {
    key:'sequence', hud:{counter:true,timer:true,end:true},
    intro:{title:'순서대로 콕 🔢',desc:'숫자 원 4개를 <b>1→2→3→4 순서대로</b> 손으로 콕!<br>25초 동안 몇 세트나 완성할까요?'},
    start(){ G.sets=0; G.endAt=performance.now()+DUR*1000; this._newSet();
      $('cNum').textContent='0'; $('cLbl').textContent='세트'; say('숫자 순서대로 손으로 콕콕 눌러봐요!'); },
    end(){ this.finish(); },
    _newSet(){ G.targets=layout(); G.next=1; },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      let hands=[];
      if(lms){ drawPose(lms,'#8FC4E8'); hands=hands2(lms); drawHandGlow(hands,'#8FC4E8'); } else setState('몸이 보이게 서 주세요');
      let done=false;
      G.targets.forEach(t=>{
        if(t.done||done) return;
        ctx.save(); ctx.fillStyle='#fff'; ctx.shadowBlur=10; ctx.shadowColor='rgba(0,0,0,.15)';
        ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

        ctx.font='900 '+Math.round(t.r*0.9)+'px Pretendard'; ctx.fillStyle=t.n===G.next?'#5c3a24':'#c9b89a'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(String(t.n),t.x,t.y+2);
        if(t.n===G.next){ const k=1+Math.sin(now/160)*0.08; ctx.beginPath(); ctx.arc(t.x,t.y,t.r*k+9,0,Math.PI*2); ctx.strokeStyle=COLS[t.n]; ctx.lineWidth=3; ctx.stroke(); }
        ctx.restore();
        if(hands.length){
          const near=anyNear(hands,t.x,t.y,t.r+16);
          if(t.lock){ if(!near) t.lock=false; return; }
          if(anySegHit(hands,t.x,t.y,t.r+16)){
            if(t.n===G.next){
              t.done=true; G.next++;
              beep(520+t.n*110,0.1); buzz(30);
              if(G.next>N){
                G.sets++; $('cNum').textContent=G.sets;
                const nn=$('cNum'); nn.classList.remove('pop'); void nn.offsetWidth; nn.classList.add('pop');
                setState(G.sets+'세트 완성! 🎉'); beep(880,0.16); buzz([0,50,40,50]);
                done=true;
              }else setState(t.n+'번! 다음은 '+G.next+'번');
            }else{ setState(G.next+'번 먼저 눌러요!'); beep(220,0.12); t.lock=true; }
          }
        }
      });
      if(done) this._newSet();
    },
    finish(){ showResult({num:G.sets,sub:'세트 완성했어요! 🔢',voice:G.sets+'세트 완성했어요! 대단해요!'}); }
  };
})();

/* ---------- 🧻 휴지 뽑기 ---------- */
GAME.tissue=(()=>{
  const G={};
  return {
    key:'tissue', hud:{counter:true,timer:true,end:true},
    intro:{title:'휴지 뽑기 🧻',desc:'휴지 상자 위에서 <b>손을 위로 휙!</b> 올려봐요.<br>25초 동안 몇 장 뽑을 수 있을까요?'},
    start(){ G.n=0; G.endAt=performance.now()+DUR*1000; G.lastPull=0; G.parts=[]; G.pt=0;
      $('cNum').textContent='0'; $('cLbl').textContent='장'; say('휴지 상자 위에서 손을 위로 쭉 올려봐요!'); },
    end(){ this.finish(); },
    frame(lms){
      const now=performance.now();

      $('timerVal').textContent=Math.ceil(remain);

      // 날아가는 휴지 파티클
      G.parts=G.parts.filter(p=>{
        p.vy+=460*dt/1000; p.vy*=0.996; p.vx*=0.986;
        p.x+=p.vx*dt/1000+Math.sin((now-p.t)/170)*1.4;
        p.y+=p.vy*dt/1000; p.rot+=p.vr*dt/1000;

        ctx.fillStyle='#fff'; ctx.shadowBlur=8; ctx.shadowColor='rgba(255,255,255,.55)';

        ctx.shadowBlur=0; ctx.globalAlpha=0.4*al; ctx.strokeStyle='#e8b8c8'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(-14,-11); ctx.lineTo(14,-8); ctx.stroke();
        ctx.restore();
        return true;
      });
      const bw=Math.min(map.W*0.46,240), bh=bw*0.6, bx=map.W/2, by=map.H-bh/2-96, zr=Math.max(58,bw*0.42), zy=by-bh/2-30;
      ctx.save();
      // 각티슈 상자(직사각형 박스)
      ctx.shadowBlur=12; ctx.shadowColor='rgba(0,0,0,.2)';
      ctx.fillStyle='#FF9DB0'; rrCtx(bx-bw/2,by-bh/2,bw,bh,14); ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle='#fff'; rrCtx(bx-bw*0.42,by-bh*0.28,bw*0.84,bh*0.2,8); ctx.fill();
      ctx.font='900 '+Math.max(13,bw*0.09)+'px Pretendard'; ctx.fillStyle='#FF6F91'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('TISSUE',bx,by+bh*0.28);
      // 위쪽 타원 슬릿
      ctx.fillStyle='#3d2b1f'; ctx.beginPath(); ctx.ellipse(bx,by-bh/2,bw*0.24,bh*0.09,0,0,Math.PI*2); ctx.fill();
      // 삐죽 나온 휴지(살랑살랑)
      const fl=Math.sin(now/220)*7;
      ctx.fillStyle='#fff'; ctx.strokeStyle='rgba(0,0,0,.06)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(bx-bw*0.16,by-bh/2+2);
      ctx.quadraticCurveTo(bx+fl,by-bh/2-bh*0.34,bx+bw*0.16,by-bh/2+2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
      hands.forEach(h=>{
        if(now-G.lastPull<260) return;
        if(h.vy<-460&&segHit(h,bx,zy,zr)){
          G.lastPull=now; G.n++;
          const n=$('cNum'); n.textContent=G.n; n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
          G.parts.push({x:bx,y:zy,vx:h.vx*0.4,vy:Math.max(-900,h.vy*0.4),rot:0,vr:(Math.random()-0.5)*6,t:now});
          if(G.parts.length>28) G.parts.shift();
          beep(760,0.1); buzz(30); setState(G.n+'장 뽑았어요! 🧻');
        }
      });
    },
    finish(){ showResult({num:G.n,sub:'장 뽑았어요! 🧻',voice:G.n+'장 뽑았어요! 정말 빨라요!'}); }
  };
})();

/* ---------- 🧽 칠판 지우기(3판) ---------- */
GAME.wipe=(()=>{
  const G={};
  const CELL=42, ROUNDS=3;
  function scribble(g,W,H){
    const M={x:W*0.07,y:H*0.10,w:W*0.86,h:H*0.66};
    const cols=['rgba(255,255,255,.85)','rgba(253,224,71,.8)','rgba(244,114,182,.75)','rgba(147,197,253,.8)'];
    g.lineCap='round';
    for(let i=0;i<26;i++){
      g.strokeStyle=cols[i%cols.length];
      g.lineWidth=6+Math.random()*9;
      g.beginPath();
      let x=M.x+Math.random()*M.w, y=M.y+Math.random()*M.h;
      g.moveTo(x,y);
      const segs=3+(Math.random()*4|0);
      for(let s2=0;s2<segs;s2++){
        const nx=Math.max(M.x,Math.min(M.x+M.w,x+(Math.random()-0.5)*W*0.45));
        const ny=Math.max(M.y,Math.min(M.y+M.h,y+(Math.random()-0.5)*H*0.3));
        g.quadraticCurveTo((x+nx)/2+(Math.random()-0.5)*60,(y+ny)/2+(Math.random()-0.5)*60,nx,ny);
        x=nx; y=ny;
      }
      g.stroke();
    }
    for(let i=0;i<8;i++){
      g.strokeStyle=cols[(Math.random()*cols.length)|0];
      g.lineWidth=5+Math.random()*6;
      g.beginPath();
      g.ellipse(M.x+Math.random()*M.w,M.y+Math.random()*M.h,20+Math.random()*46,14+Math.random()*30,Math.random()*3,0,Math.PI*2);
      g.stroke();
    }
    return M;
  }
  return {
    key:'wipe', hud:{counter:true,timer:true,end:true},
    intro:{title:'칠판 지우기 🧽',desc:'앗, 칠판이 낙서로 가득!<br><b>손바닥을 크게 휘저어</b> 낙서를 싹싹 지워요.<br>3판 연속 도전!'},
    _newBoard(){
      G.bc=document.createElement('canvas'); G.bc.width=map.W; G.bc.height=map.H;
      G.bg=G.bc.getContext('2d');
      const M=scribble(G.bg,map.W,map.H);
      G.cells=[];
      const cols=Math.ceil(map.W/CELL), rows=Math.ceil(map.H/CELL);
      for(let r2=0;r2<rows;r2++) for(let c2=0;c2<cols;c2++){
        const cx2=c2*CELL+CELL/2, cy2=r2*CELL+CELL/2;
        if(cx2>M.x&&cx2<M.x+M.w&&cy2>M.y&&cy2<M.y+M.h) G.cells.push({x:cx2,y:cy2,clean:false});
      }
      G.total=G.cells.length; G.cleanN=0;
      $('cLbl').textContent='R'+G.round+'/'+ROUNDS; $('cNum').textContent='0%';
    },
    start(){
      G.t0=performance.now(); G.done=false; G.round=1; G.betweenUntil=0;
      this._newBoard(); say('칠판을 손으로 쓱쓱 문질러 지워봐요!');
    },
    end(){ this.finish(true); },
    finish(dnf){
      if(G.done) return; G.done=true;
      const sec=(performance.now()-G.t0)/1000;
      if(!dnf) showResult({num:sec.toFixed(1),sub:'초에 3판 다 지웠어요! 🧽',voice:'와 정말 빨라요! 칠판이 반짝반짝해요!'});
      else{
        const pct=G.total?Math.round(G.cleanN/G.total*100):0;
        showResult({num:G.round,sub:'판째 도전 중이었어요',voice:G.round+'판째까지 지웠어요! 다음에 또 해봐요!'});
      }
    },
    frame(lms){
      const now=performance.now();
      if(G.done) return;
      $('timerVal').textContent=((now-G.t0)/1000).toFixed(1);
      if(G.betweenUntil>now){
        if(lms) drawPose(lms,'#8FCFCF');
        ctx.fillStyle='rgba(60,110,110,.42)'; ctx.fillRect(0,0,map.W,map.H);
        ctx.save(); ctx.font='900 '+Math.max(22,map.W/12)+'px Pretendard'; ctx.textAlign='center';
        ctx.fillStyle='#fff'; ctx.shadowBlur=16; ctx.shadowColor='#8FCFCF';
        ctx.fillText(G.round+'번째 칠판!',map.W/2,map.H*0.42);
        ctx.font='700 '+Math.max(14,map.W/26)+'px Pretendard';
        ctx.fillText('또 낙서가?! 준비…',map.W/2,map.H*0.42+Math.max(30,map.W/12));
        ctx.restore();
        return;
      }
      let hands=[];
      if(lms){ drawPose(lms,'#8FCFCF'); hands=hands2(lms); } else setState('몸이 보이게 서 주세요');
      const R=Math.max(44,Math.min(map.W,map.H)/8);
      if(hands.length){
        if(hands.some(h=>Math.hypot(h.x-h.px,h.y-h.py)>26)&&now-(G.lastWipe||0)>240){ G.lastWipe=now; beep(340,0.06,0.12); }
        G.bg.save(); G.bg.globalCompositeOperation='destination-out'; G.bg.fillStyle='#000';
        hands.forEach(h=>{
          const steps=Math.max(1,Math.ceil(Math.hypot(h.x-h.px,h.y-h.py)/(R*0.5)));
          for(let s2=0;s2<=steps;s2++){
            const x=h.px+(h.x-h.px)*s2/steps, y=h.py+(h.y-h.py)*s2/steps;
            G.bg.beginPath(); G.bg.arc(x,y,R,0,Math.PI*2); G.bg.fill();
            G.cells.forEach(cell=>{ if(!cell.clean&&Math.hypot(cell.x-x,cell.y-y)<R){ cell.clean=true; G.cleanN++; } });
          }
        });
        G.bg.restore();
      }
      ctx.fillStyle='rgba(60,110,110,.42)'; ctx.fillRect(0,0,map.W,map.H);
      ctx.drawImage(G.bc,0,0);
      hands.forEach(h=>{
        ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(-0.35);
        ctx.shadowBlur=12; ctx.shadowColor='rgba(255,255,255,.5)';
        ctx.fillStyle='#d9c9a3'; rrCtx(-R*0.55,-R*0.32,R*1.1,R*0.64,10); ctx.fill();
        ctx.fillStyle='#5a4632'; rrCtx(-R*0.55,-R*0.32,R*1.1,R*0.2,8); ctx.fill();
        ctx.restore();
      });
      const pct=G.total?Math.round(G.cleanN/G.total*100):0;
      $('cNum').textContent=pct+'%';
      if(pct>=97){
        if(G.round>=ROUNDS){ beep(880,0.2); buzz([0,60,50,60]); this.finish(false); return; }
        G.round++; beep(620,0.14); buzz([0,50,40,50]);
        setState('클리어! '+G.round+'번째 칠판 등장!');
        this._newBoard(); G.betweenUntil=now+1200; return;
      }
      setState('R'+G.round+'/'+ROUNDS+' — '+(pct<5?'낙서를 손으로 문질러 지워요!':(pct<60?'싹싹 문질러요! '+pct+'%':'거의 다 됐어요!')));
    }
  };
})();

/* ---------- 🔨 콩콩 못박기 ---------- */
GAME.hammer=(()=>{
  const G={};
  const HITS=3;
  function newNail(avoid){
    const r=Math.max(30,Math.min(map.W,map.H)/11);
    const p=randPos(r*1.3,avoid);
    return {x:p.x,y:Math.min(Math.max(p.y,map.H*0.28),map.H*0.62),r,depth:0,last:0,sparks:[]};
  }
  return {
    key:'hammer', hud:{counter:true,timer:true,end:true},
    intro:{title:'콩콩 못박기 🔨',desc:'못 머리 위로 손을 <b>위에서 아래로 콩콩!</b> 내리쳐요.<br>세 번 치면 완성! 몇 개나 박을까요?'},
    start(){ G.n=0; G.endAt=performance.now()+DUR*1000;
      const a=newNail(null);
      G.nails=[a,newNail([{x:a.x,y:a.y,d:a.r*3.4}])];
      $('cNum').textContent='0'; $('cLbl').textContent='개'; say('못 머리 위에서 손을 콩콩 내리쳐봐요!'); },
    end(){ this.finish(); },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      let hands=[];
      if(lms){ drawPose(lms,'#E0AD70'); hands=hands2(lms); drawHandGlow(hands,'#E0AD70'); } else setState('몸이 보이게 서 주세요');
      G.nails.forEach(nl=>{
        const L=nl.r*2.1, sink=nl.depth/HITS;
        const headY=nl.y-L*(1-sink);
        ctx.fillStyle='#c98a4a'; rrCtx(nl.x-nl.r*1.5,nl.y,nl.r*3,nl.r*0.85,8); ctx.fill();
        ctx.fillStyle='#a56a30'; rrCtx(nl.x-nl.r*1.5,nl.y,nl.r*3,9,8); ctx.fill();
        ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=7; ctx.shadowBlur=6; ctx.shadowColor='#94a3b8';
        ctx.beginPath(); ctx.moveTo(nl.x,headY); ctx.lineTo(nl.x,nl.y+5); ctx.stroke(); ctx.shadowBlur=0;
        ctx.fillStyle='#e2e8f0';
        ctx.beginPath(); ctx.ellipse(nl.x,headY,nl.r*0.58,nl.r*0.22,0,0,Math.PI*2); ctx.fill();
        ctx.save(); ctx.setLineDash([7,7]); ctx.strokeStyle='rgba(224,173,112,.5)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(nl.x,headY,nl.r*0.9+14,0,Math.PI*2); ctx.stroke(); ctx.restore();
        for(let i=0;i<HITS;i++){ ctx.beginPath(); ctx.arc(nl.x-16+i*16,nl.y+nl.r*1.3,4.5,0,Math.PI*2);
          ctx.fillStyle=i<nl.depth?'#93D693':'rgba(148,163,184,.4)'; ctx.fill(); }
        if(hands.length&&now-nl.last>270){
          if(hands.some(h=>h.vy>600&&segHit(h,nl.x,headY,nl.r*0.9+16))){
            nl.last=now; nl.depth++;
            nl.sparks=Array.from({length:7},()=>({a:Math.random()*6.28,v:130+Math.random()*260,t:now}));
            beep(420,0.08); buzz(38);
            if(nl.depth>=HITS){
              G.n++;
              const el=$('cNum'); el.textContent=G.n; el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
              setState('뚝딱! 완성! 🔨'); beep(760,0.16);
              const others=G.nails.filter(o=>o!==nl).map(o=>({x:o.x,y:o.y,d:o.r*3.4}));
              Object.assign(nl,newNail(others));
            }else setState(['땅!','땅땅!'][nl.depth-1]||'땅!');
          }
        }
        nl.sparks=nl.sparks.filter(s=>{
          const age=now-s.t; if(age>320) return false;
          const d=s.v*age/1000, al=1-age/320;
          ctx.strokeStyle='rgba(253,224,71,'+al+')'; ctx.lineWidth=3;
          ctx.beginPath(); ctx.moveTo(nl.x+Math.cos(s.a)*d*0.4,headY+Math.sin(s.a)*d*0.4);
          ctx.lineTo(nl.x+Math.cos(s.a)*d,headY+Math.sin(s.a)*d); ctx.stroke();
          return true;
        });
      });
    },
    finish(){ showResult({num:G.n,sub:'개 못을 박았어요! 🔨',voice:G.n+'개 만들었어요! 목수님 최고!'}); }
  };
})();

/* ---------- 🔢 숫자 콕콕(10 이하) ---------- */
GAME.numquiz=(()=>{
  const G={};
  const ROUNDS=6;
  function gen(){
    const a=1+((Math.random()*4)|0), b=1+((Math.random()*4)|0);
    const ans=a+b;
    let wrong=ans+(Math.random()<0.5?1:-1); if(wrong<1) wrong=ans+2; if(wrong>10) wrong=ans-2;
    const leftOk=Math.random()<0.5;
    G.q={a,b,ans,ch:[leftOk?ans:wrong,leftOk?wrong:ans],ok:leftOk?0:1,lock:true};
  }
  function burst(x,y,col){
    const out=[]; for(let i=0;i<16;i++){ const a=Math.random()*6.28;
      out.push({x,y,vx:Math.cos(a)*(120+Math.random()*180),vy:Math.sin(a)*(120+Math.random()*180)-60,t:performance.now(),col}); }
    return out;
  }
  return {
    key:'numquiz', hud:{counter:true,end:true},
    intro:{title:'숫자 콕콕 🔢',desc:'그림 개수를 세어보고 <b>맞는 숫자를 손으로 콕!</b><br>10까지의 숫자만 나와요. 6문제 도전!'},
    start(){ G.round=0; G.ok=0; G.fx=[]; gen(); $('cNum').textContent='0'; $('cLbl').textContent='문제'; say('숫자를 세어서 콕 눌러봐요!'); },
    end(){ this.finish(); },
    frame(lms){
      const now=performance.now();
      let hands=[];
      if(lms){ drawPose(lms,'#E0C86F'); hands=hands2(lms); drawHandGlow(hands,'#E0C86F'); } else setState('몸이 보이게 서 주세요');
      const r=Math.min(map.W,map.H)*0.115;
      const Lx=map.W*0.24, Rx=map.W*0.76, chY=map.H*0.24;
      const cx=map.W/2;
      const panelW=Math.min(map.W*0.7,280), fruitSz=Math.min(26,panelW/5.6), rowGap=fruitSz*1.2;
      const panelH=rowGap*2+fruitSz*1.1, topY=chY+r+26;
      ctx.save(); ctx.fillStyle='rgba(255,255,255,.94)'; ctx.shadowBlur=10; ctx.shadowColor='rgba(0,0,0,.15)';
      rrCtx(cx-panelW/2,topY,panelW,panelH,22); ctx.fill(); ctx.shadowBlur=0;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      function fruitRow(n,emoji,y){
        const gap=fruitSz*1.05, totalW=(n-1)*gap;
        ctx.font=fruitSz+'px sans-serif';
        for(let i=0;i<n;i++) ctx.fillText(emoji,cx-totalW/2+i*gap,y);
      }
      fruitRow(G.q.a,'🍎',topY+fruitSz*0.75);
      ctx.font='900 '+Math.round(fruitSz*0.7)+'px Pretendard'; ctx.fillStyle='#c96a3a';
      ctx.fillText('+',cx,topY+rowGap+fruitSz*0.05);
      fruitRow(G.q.b,'🍊',topY+rowGap+fruitSz*0.85);
      ctx.font='900 '+Math.round(fruitSz*0.85)+'px Pretendard'; ctx.fillStyle='#c96a3a';
      ctx.fillText('= ?',cx,topY+rowGap*2+fruitSz*0.35);
      ctx.restore();
      [{x:Lx,v:G.q.ch[0]},{x:Rx,v:G.q.ch[1]}].forEach((c,i)=>{
        const isCorrectPick=G.q.done&&i===G.q.ok;
        const pop=isCorrectPick?1+Math.sin(Math.min(1,(now-G.q.doneAt)/220)*Math.PI)*0.18:1;
        ctx.save(); ctx.fillStyle='#fff'; ctx.shadowBlur=12; ctx.shadowColor='rgba(0,0,0,.18)';
        ctx.beginPath(); ctx.arc(c.x,chY,r*pop,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
        ctx.lineWidth=5; ctx.strokeStyle=isCorrectPick?'#93D693':'#FFE39A'; ctx.stroke();
        ctx.font='900 '+Math.max(30,r*0.9*pop)+'px Pretendard'; ctx.fillStyle='#7a3d5e'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(String(c.v),c.x,chY+2); ctx.restore();
        if(hands.length&&!G.q.done){
          if(G.q.lock){ if(!anyNear(hands,Lx,chY,r+16)&&!anyNear(hands,Rx,chY,r+16)) G.q.lock=false; return; }
          if(anySegHit(hands,c.x,chY,r+16)){
            G.q.done=true; G.q.doneAt=now;

/* ---------- 🦟 모기 잡기(박수) ---------- */
GAME.mosquito=(()=>{
  const G={};
  function spawn(){
    G.mq={x:map.W*(0.25+Math.random()*0.5),y:map.H*(0.16+Math.random()*0.4),tx:map.W/2,ty:map.H*0.3,retarget:0,
      spd:Math.min(map.W,map.H)*0.28};
  }
  return {
    key:'mosquito', hud:{counter:true,timer:true,end:true},
    intro:{title:'모기 잡기 🦟',desc:'앵앵~ 모기가 날아다녀요. <b>모기 근처에서 두 손을 짝!</b><br>박수로 잡아요. 25초 동안 몇 마리 잡을까요?'},
    start(){ G.n=0; G.endAt=performance.now()+DUR*1000; G.pt=0; G.prevGap=null; G.lastClap=0; G.respawnAt=0; G.mq=null;
      $('cNum').textContent='0'; $('cLbl').textContent='마리'; say('모기 근처에서 짝 박수를 쳐봐요!'); },
    end(){ this.finish(); },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      const dt=Math.min(50,now-(G.pt||now)); G.pt=now;
      let hands=[];
      if(lms){ drawPose(lms,'#93D693'); hands=hands2(lms); drawHandGlow(hands,'#93D693'); } else setState('몸이 보이게 서 주세요');
      if(!G.mq&&now>=G.respawnAt) spawn();
      if(G.mq){
        const q=G.mq;
        if(now>=q.retarget){ q.tx=map.W*(0.15+Math.random()*0.7); q.ty=map.H*(0.14+Math.random()*0.42); q.retarget=now+600+Math.random()*600; }
        const dx=q.tx-q.x, dy=q.ty-q.y, dd=Math.hypot(dx,dy)||1;
        q.x+=dx/dd*q.spd*dt/1000+Math.sin(now/110)*1.2; q.y+=dy/dd*q.spd*dt/1000+Math.cos(now/130)*1.2;
        ctx.save(); ctx.translate(q.x,q.y);
        const halo=1+Math.sin(now/160)*0.12;
        ctx.beginPath(); ctx.arc(0,0,Math.max(56,Math.min(map.W,map.H)/6.2)*halo,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,.85)'; ctx.shadowBlur=18; ctx.shadowColor='rgba(147,214,147,.9)'; ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle='#5fa85f'; ctx.lineWidth=3; ctx.stroke();
        ctx.rotate(Math.sin(now/90)*0.2);
        ctx.font=Math.max(70,Math.min(map.W,map.H)/4.6)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('🦟',0,2); ctx.restore();
        if(hands.length===2){
          const gap=Math.hypot(hands[0].x-hands[1].x,hands[0].y-hands[1].y);
          const m2=Math.min(map.W,map.H);
          if(G.prevGap!=null){
            const closing=(G.prevGap-gap)/Math.max(16,dt)*1000;
            if(gap<m2/5&&closing>m2*0.7&&now-G.lastClap>420){
              G.lastClap=now;
              const mx=(hands[0].x+hands[1].x)/2, my=(hands[0].y+hands[1].y)/2;
              if(Math.hypot(mx-q.x,my-q.y)<m2/3.6){
                G.n++; $('cNum').textContent=G.n;
                const n=$('cNum'); n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
                beep(880,0.12); buzz(35); setState(G.n+'마리 짝! 🦟'); G.mq=null; G.respawnAt=now+400;
              }else{ beep(300,0.1); setState('아깝다! 모기 가까이에서 짝!'); }
            }
          }
          G.prevGap=gap;
        }else G.prevGap=null;
      }
    },
    finish(){ showResult({num:G.n,sub:'마리 잡았어요! 🦟',voice:G.n+'마리 잡았어요! 손뼉 챔피언!'}); }
  };
})();

/* ---------- 🙇 땅 짚기(유연성 체크) ---------- */
GAME.flex=(()=>{
  const st={phase:'up'};
  const c=makeCounter({
    key:'flex',color:'#B79AE8',emoji:'🙇',debounce:650,
    reset(){ st.phase='up'; },
    judge(S,lms){
      if(visOf(lms[15])<0.3||visOf(lms[16])<0.3){ setState('두 손이 잘 보이게 해줘요'); return; }
      const shY=(lms[11].y+lms[12].y)/2;
      const hipY=(visOf(lms[23])>0.3&&visOf(lms[24])>0.3)?(lms[23].y+lms[24].y)/2:shY+0.2;
      const ankleY=(visOf(lms[27])>0.3&&visOf(lms[28])>0.3)?(lms[27].y+lms[28].y)/2:hipY+0.35;
      const wristY=Math.min(lms[15].y,lms[16].y);
      if(st.phase==='up'){
        if(wristY>ankleY-0.08){ st.phase='down'; setState('좋아요! 이제 쭉 펴고 일어나요 🙇'); }
        else setState('허리를 숙여 손으로 땅을 짚어봐요');
      }else{
        if(wristY<hipY-0.03){ c._rep(); st.phase='up'; }
      }
    }
  });
  c.intro={title:'땅 짚기 🙇',desc:'허리를 <b>쭈욱 숙여 손으로 땅을 짚고</b> 다시 일어나요!<br>몸이 유연해지는 운동이에요.'};
  return c;
})();

/* ---------- 🦩 한발 균형 잡기 ---------- */
GAME.balance=(()=>{
  const G={};
  function ankleAsym(lms){
    if(visOf(lms[27])<0.3||visOf(lms[28])<0.3||visOf(lms[23])<0.3||visOf(lms[24])<0.3) return null;
    const hipW=Math.abs(lms[23].x-lms[24].x)||0.2;
    return Math.abs(lms[27].y-lms[28].y)/hipW;
  }
  return {
    key:'balance', hud:{counter:true,end:true},
    intro:{title:'한발 균형 🦩',desc:'한쪽 발을 <b>번쩍 들고 최대한 오래</b> 버텨봐요!<br>기록이 늘어날수록 짱짱! 그만할 땐 "그만할래요"를 눌러요.'},
    start(){ G.best=0; G.holdStart=null; $('cNum').textContent='0.0'; $('cLbl').textContent='초'; say('한 발을 번쩍 들고 최대한 오래 버텨봐요!'); },
    end(){ this.finish(); },
    frame(lms){
      if(!lms){ setState('전신이 보이게 서 주세요'); G.holdStart=null; return; }
      drawPose(lms,'#E0B25E');
      const asym=ankleAsym(lms);
      const now=performance.now();
      if(asym==null){ setState('두 발과 엉덩이가 잘 보이게 서봐요'); G.holdStart=null; return; }
      if(asym>0.55){
        if(!G.holdStart){ G.holdStart=now; beep(600,0.08); }
        const cur=(now-G.holdStart)/1000;
        $('cNum').textContent=cur.toFixed(1);
        if(cur>G.best) G.best=cur;
        setState('버티는 중… '+cur.toFixed(1)+'초! 🦩');
      }else{
        if(G.holdStart) setState('아깝다! 다시 한 발을 들어봐요');
        else setState('한쪽 발을 번쩍 들어올려요');
        G.holdStart=null;
        $('cNum').textContent=G.best.toFixed(1);
      }
    },
    finish(){ showResult({num:G.best.toFixed(1),sub:'초 버텼어요! 🦩',voice:G.best.toFixed(1)+'초나 버텼어요! 균형왕이에요!'}); }
  };
})();

/* ---------- 🧍 자세 분석(스쿼트코치 이식: 정면+측면 스캔→점수+처방) ---------- */
GAME.posture=(()=>{
  const G={};
  const HOLD=4.0;
  const D=180/Math.PI;
  const IDX=[0,7,8,11,12,23,24,25,26,27,28];
  function vpx(l){ return {x:l.x*map.vw,y:l.y*map.vh}; }
  function lineDeg(a,b){ const A=vpx(a),B=vpx(b); return Math.atan2(B.y-A.y,B.x-A.x)*D; }
  function tiltDeg(a,b){ const d=Math.abs(lineDeg(a,b))%180; return Math.min(d,180-d); }
  function fromVertDeg(top,botm){ const T=vpx(top),B=vpx(botm); return Math.atan2(Math.abs(T.x-B.x),Math.max(1e-6,Math.abs(B.y-T.y)))*D; }
  function avgFrames(buf){
    const out={};
    IDX.forEach(i=>{ let x=0,y=0,z=0,v=0; buf.forEach(f=>{ x+=f[i].x; y+=f[i].y; z+=(f[i].z||0); v+=visOf(f[i]); });
      out[i]={x:x/buf.length,y:y/buf.length,z:z/buf.length,visibility:v/buf.length}; });
    return out;
  }
  function stanceOf(lms){
    const shW=Math.abs(lms[11].x-lms[12].x)*map.vw;
    const torso=Math.abs((lms[11].y+lms[12].y)/2-(lms[23].y+lms[24].y)/2)*map.vh;
    if(torso<1) return 'unknown';
    const ratio=shW/torso;
    if(ratio>0.55) return 'front'; if(ratio<0.32) return 'side'; return 'unknown';
  }
  function grade3(v,warn,bad){ return v<warn?0:(v<bad?1:2); }
  const GTXT=['양호','주의','관리 필요'];
  function computeFront(a){
    const m=[];
    const head=tiltDeg(a[7],a[8]); const headHi=(a[7].y<a[8].y)?'왼':'오른';
    m.push({ic:'🙂',nm:'머리 기울기',val:head,unit:'°',g:grade3(head,3,6),max:10,
      d:head<3?'머리가 수평으로 잘 서 있어요.':'머리가 '+headHi+'쪽으로 '+head.toFixed(1)+'° 기울어져 있어요.',rx:['neckSide']});
    const midS={x:(a[11].x+a[12].x)/2,y:(a[11].y+a[12].y)/2};
    const hshift=fromVertDeg(a[0],midS);
    m.push({ic:'👤',nm:'머리 치우침',val:hshift,unit:'°',g:grade3(hshift,4,8),max:14,
      d:hshift<4?'머리가 몸 중심 바로 위에 잘 놓여 있어요.':'머리가 몸 중심에서 옆으로 '+hshift.toFixed(1)+'° 치우쳐 있어요.',rx:['chinTuck','neckSide']});
    const sh=tiltDeg(a[11],a[12]); const shHi=(a[11].y<a[12].y)?'왼':'오른';
    m.push({ic:'🫲',nm:'어깨 수평',val:sh,unit:'°',g:grade3(sh,2.5,5),max:10,
      d:sh<2.5?'양쪽 어깨 높이가 비슷해요.':shHi+'쪽 어깨가 '+sh.toFixed(1)+'° 높아요.',rx:['wallAngel','neckSide']});
    const pv=tiltDeg(a[23],a[24]); const pvHi=(a[23].y<a[24].y)?'왼':'오른';
    m.push({ic:'🩳',nm:'골반 수평',val:pv,unit:'°',g:grade3(pv,2.5,5),max:10,
      d:pv<2.5?'골반이 수평으로 균형 잡혀 있어요.':pvHi+'쪽 골반이 '+pv.toFixed(1)+'° 높아요.',rx:['sidePlank','squatApp']});
    const midSh={x:(a[11].x+a[12].x)/2,y:(a[11].y+a[12].y)/2};
    const midAn={x:(a[27].x+a[28].x)/2,y:(a[27].y+a[28].y)/2};
    const lean=fromVertDeg(midSh,midAn);
    m.push({ic:'🧍',nm:'몸 중심선',val:lean,unit:'°',g:grade3(lean,2,4),max:8,
      d:lean<2?'몸의 중심이 반듯하게 서 있어요.':'몸이 한쪽으로 '+lean.toFixed(1)+'° 기울어 서 있어요.',rx:['balance','sidePlank']});
    return m;
  }
  function computeSide(a){
    const m=[];
    const L=visOf(a[7])+visOf(a[11])+visOf(a[23])>=visOf(a[8])+visOf(a[12])+visOf(a[24]);
    const ear=L?a[7]:a[8], sh=L?a[11]:a[12], hip=L?a[23]:a[24], knee=L?a[25]:a[26], ank=L?a[27]:a[28];
    const neck=fromVertDeg(ear,sh);
    m.push({ic:'🐢',nm:'거북목 (머리 전방)',val:neck,unit:'°',g:grade3(neck,10,17),max:30,
      d:neck<10?'귀가 어깨 위에 잘 놓여 있어요. 목 정렬 좋아요!':'귀가 어깨보다 '+neck.toFixed(1)+'° 앞으로 나와 있어요.',rx:['chinTuck','neckStretch']});
    const back=fromVertDeg(sh,hip);
    m.push({ic:'🧎',nm:'상체 기울기 (굽은 등)',val:back,unit:'°',g:grade3(back,4,8),max:16,
      d:back<4?'등이 반듯하게 서 있어요.':'상체가 '+back.toFixed(1)+'° 앞으로 기울어 있어요.',rx:['chestOpen','wallAngel','jacksApp']});
    const sway=fromVertDeg(hip,ank);
    m.push({ic:'🍑',nm:'골반 전방 이동',val:sway,unit:'°',g:grade3(sway,4,8),max:14,
      d:sway<4?'골반이 발목 위에 안정적으로 놓여 있어요.':'골반이 발목보다 '+sway.toFixed(1)+'° 앞뒤로 밀려 있어요.',rx:['wallStand','sidePlank']});
    const kneeA=angle(hip,knee,ank);
    m.push({ic:'🦵',nm:'무릎 펴짐',val:kneeA,unit:'°',fmt:v=>Math.round(v)+'',g:kneeA>=165?0:(kneeA>=150?1:2),max:180,gauge:Math.max(0,Math.min(1,(180-kneeA)/40)),
      d:kneeA>=165?'서 있을 때 무릎이 자연스럽게 펴져 있어요.':'서 있을 때 무릎이 '+Math.round(180-kneeA)+'°쯤 굽어 있어요.',rx:['squatApp']});
    const align=angle(sh,hip,ank);
    m.push({ic:'📏',nm:'옆모습 일직선',val:180-align,unit:'°',fmt:v=>v.toFixed(1),g:align>=170?0:(align>=162?1:2),max:25,gauge:Math.max(0,Math.min(1,(180-align)/25)),
      d:align>=170?'어깨-골반-발목이 일직선에 가까워요. 아주 좋아요!':'어깨-골반-발목 선이 '+(180-align).toFixed(1)+'° 꺾여 있어요.',rx:['wallStand','sidePlank']});
    return m;
  }
  const RX={
    chinTuck:{ic:'🐢',nm:'턱 당기기',how:'정면을 보고 턱을 뒤로 지그시 당겨 이중턱을 만들었다가 5초 유지 후 풀어요.',dose:'10회 × 3세트, 매일'},
    neckStretch:{ic:'🙆',nm:'목 뒤 늘리기',how:'양손을 뒤통수에 얹고 턱을 가슴 쪽으로 지그시 당겨 목 뒤를 15초 늘려요.',dose:'15초 × 3회'},
    neckSide:{ic:'🤷',nm:'목 옆 스트레칭',how:'오른손으로 머리 왼쪽을 잡고 오른쪽으로 지그시 당겨 15초. 반대쪽도 똑같이 해요.',dose:'양쪽 15초 × 3회'},
    chestOpen:{ic:'🚪',nm:'가슴 열기 스트레칭',how:'문틀에 양팔을 대고 한 발 앞으로 내밀며 가슴을 쭉 펴요.',dose:'20초 × 3회'},
    wallAngel:{ic:'👼',nm:'벽 천사',how:'벽에 등·머리를 붙이고 양팔을 W자로 만든 뒤 천천히 위로 올렸다 내려요.',dose:'10회 × 2세트'},
    wallStand:{ic:'🧱',nm:'벽에 바르게 서기',how:'뒤통수·어깨·엉덩이·뒤꿈치를 벽에 붙이고 1분간 바른 자세를 기억해요.',dose:'1분 × 3회'},
    sidePlank:{ic:'🛶',nm:'사이드 플랭크',how:'옆으로 누워 팔꿈치로 몸을 들어 어깨-골반-발이 일직선이 되게 버텨요.',dose:'양쪽 20초 × 2세트'},
    balance:{ic:'🦩',nm:'한발 서기 밸런스',how:'한 발을 들고 30초 균형을 잡아요. 흔들리면 배에 힘!',dose:'양쪽 30초 × 2회'},
    squatApp:{ic:'🐻',nm:'앉았다 일어나기 (AI 카운트)',how:'하체와 골반 주변 근육을 고르게 강화하는 기본 운동이에요.',dose:'15개 × 2세트',go:'squat'},
    jacksApp:{ic:'🙌',nm:'만세 체조 (AI 카운트)',how:'어깨를 크게 움직여 굽은 어깨를 펴는 데 도움 되는 전신 운동이에요.',dose:'20개 × 2세트',go:'jacks'}
  };
  function snapshot(a,mode){
    const c=document.createElement('canvas');
    c.width=DEBUG?720:(video.videoWidth||720); c.height=DEBUG?1280:(video.videoHeight||1280);
    const g=c.getContext('2d');
    g.fillStyle='#FFF3D6'; g.fillRect(0,0,c.width,c.height);
    if(!DEBUG){
      if(facing==='user'){ g.save(); g.translate(c.width,0); g.scale(-1,1); g.drawImage(video,0,0,c.width,c.height); g.restore(); }
      else g.drawImage(video,0,0,c.width,c.height);
    }
    const p=i=>{ let x=a[i].x*c.width; const y=a[i].y*c.height; if(facing==='user'&&!DEBUG) x=c.width-x; else if(DEBUG) x=a[i].x*c.width; return {x,y}; };
    function seg(i,j,col,w){ const A=p(i),B=p(j); g.strokeStyle=col; g.lineWidth=w||5;
      g.beginPath(); g.moveTo(A.x,A.y); g.lineTo(B.x,B.y); g.stroke(); }
    function dot(i,col){ const A=p(i); g.fillStyle=col; g.beginPath(); g.arc(A.x,A.y,7,0,Math.PI*2); g.fill(); }
    if(mode==='front'){ seg(7,8,'#FF9DB0',4); seg(11,12,'#FF6F91',6); seg(23,24,'#FF9DB0',5);
      [7,8,11,12,23,24,25,26,27,28].forEach(i=>dot(i,'#FF6F91')); }
    else{ const L=visOf(a[7])+visOf(a[11])>=visOf(a[8])+visOf(a[12]); const e=L?7:8,s=L?11:12,h=L?23:24,k=L?25:26,an=L?27:28;
      seg(e,s,'#FF6F91',6); seg(s,h,'#FF9DB0',5); seg(h,k,'#FF9DB0',5); seg(k,an,'#FF9DB0',5);
      [e,s,h,k,an].forEach(i=>dot(i,'#FF6F91')); }
    return c.toDataURL('image/jpeg',0.82);
  }
  function calcScore(all){
    let s=100;
    all.forEach(x=>{ const heavy=/거북목|어깨 수평|골반 수평|상체 기울기/.test(x.nm);
      if(x.g===1) s-=heavy?5:3; else if(x.g===2) s-=heavy?12:8; });
    return Math.max(30,Math.round(s));
  }
  function findG(list,sub){ const m=list.find(x=>x.nm.includes(sub)); return m?m.g:0; }
  function findVal(list,sub){ const m=list.find(x=>x.nm.includes(sub)); return m?m.val:0; }
  const TYPES={
    거북목:['거북목형','🐢','목이 어깨보다 앞으로 나온 경향이 두드러져요.'],
    굽은등:['굽은등형','🧎','등이 앞으로 굽는 경향이 두드러져요.'],
    스웨이백:['스웨이백형','🍑','골반이 발목보다 앞뒤로 밀린 경향이 두드러져요.'],
    좌우비대칭:['좌우비대칭형','⚖️','어깨나 골반이 한쪽으로 기운 경향이 두드러져요.'],
    체중쏠림:['체중쏠림형','🧍','몸의 중심이 한쪽으로 치우친 경향이 두드러져요.']
  };
  function classifyType(frontM,sideM){
    const cand=[['거북목',findG(sideM,'거북목')],['굽은등',findG(sideM,'상체 기울기')],['스웨이백',findG(sideM,'골반 전방')],
      ['좌우비대칭',Math.max(findG(frontM,'어깨 수평'),findG(frontM,'골반 수평'))],['체중쏠림',findG(frontM,'몸 중심선')]]
      .filter(c=>c[1]>=1).sort((a,b)=>b[1]-a[1]);
    if(!cand.length) return {tag:'균형 잡힌 자세',emoji:'🌿',desc:'전반적으로 균형 잡힌 좋은 자세예요.'};
    if(cand.length===1){ const [tag,emoji,desc]=TYPES[cand[0][0]]; return {tag,emoji,desc}; }
    return {tag:'복합형',emoji:'🧩',desc:'여러 부위에서 함께 신경 쓰면 좋을 지점들이 보여요.'};
  }
  function buildNarrative(frontM,sideM,type){
    const bad=[...frontM,...sideM].filter(x=>x.g>0).sort((a,b)=>b.g-a.g);
    if(!bad.length) return '측정된 지표가 모두 양호한 범위예요. 지금처럼 바른 자세를 잘 유지하고 있어요!';
    const top=bad.slice(0,2).map(x=>x.nm.replace(/\s*\(.*?\)/,'')).join('와 ');
    let s='이번 측정에서는 '+top+' 부분을 가장 신경 쓰면 좋겠어요. ';
    if(type.tag!=='복합형'&&type.tag!=='균형 잡힌 자세') s+=type.tag+' 경향이 보이는데, ';
    s+='아래 추천 운동을 하루 5분씩만 꾸준히 실천해도 눈에 띄게 좋아질 수 있어요!';
    return s;
  }
  function loadHistory(){ try{ return JSON.parse(localStorage.getItem('kp_posture_hist')||'[]'); }catch(e){ return []; } }
  function saveHistory(entry){ try{ const h=loadHistory(); h.push(entry); while(h.length>10) h.shift(); localStorage.setItem('kp_posture_hist',JSON.stringify(h)); }catch(e){} }
  function trendText(prev,entry){
    if(!prev) return '';
    const ds=entry.score-prev.score;
    return '지난 측정 대비 '+(ds>0?'+':'')+ds+'점';
  }
  function buildReport(){
    G.step='done';
    const all=[...G.frontM,...G.sideM];
    const worst=Math.max(...all.map(x=>x.g));
    const cnt=[0,0,0]; all.forEach(x=>cnt[x.g]++);
    const rxKeys=[...new Set(all.filter(x=>x.g>0).flatMap(x=>x.rx))];
    if(!rxKeys.length) rxKeys.push('squatApp','jacksApp');
    G.score=calcScore(all);
    G.band=G.score>=90?['A','훌륭해요!','#a3e635']:G.score>=80?['B','좋아요, 조금만 다듬어요','#22d3ee']:G.score>=70?['C','몇 가지 관리가 필요해요','#fbbf24']:['D','꾸준한 관리가 필요해요','#fb7185'];
    G.type=classifyType(G.frontM,G.sideM);
    G.narrative=buildNarrative(G.frontM,G.sideM,G.type);
    const prevEntry=(()=>{ const h=loadHistory(); return h.length?h[h.length-1]:null; })();
    const entry={ts:Date.now(),score:G.score};
    saveHistory(entry);
    const trendNote=trendText(prevEntry,entry);
    const gcol=['#a3e635','#fbbf24','#fb7185'];
    let h='<h2>🧍 자세 분석 리포트</h2><div class="rp-date">'+new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})+' · AI 카메라 측정</div>';
    h+='<div class="score-wrap"><div class="score-ring" style="--p:'+G.score+';--c:'+G.band[2]+'"><span>'+G.score+'</span></div>'
      +'<div class="score-side"><div class="sc-band" style="color:'+G.band[2]+'">'+G.band[0]+' · '+G.band[1]+'</div>'
      +'<div class="sc-rel">지표 '+all.length+'개 분석'+(trendNote?'<br>'+trendNote:'')+'</div></div></div>';
    h+='<div style="text-align:center"><span class="type-badge">'+G.type.emoji+' 자세 유형 · '+G.type.tag+'</span></div>';
    h+='<div class="narrative">📝 <b>종합 소견</b><br>'+G.narrative+'</div>';
    h+='<div class="rp-snaps"><figure><img src="'+G.snapF+'" alt="정면"><figcaption>정면 측정</figcaption></figure>';
    h+='<figure><img src="'+G.snapS+'" alt="측면"><figcaption>측면 측정</figcaption></figure></div>';
    h+='<div class="rp-summary"><span class="sm-chip g'+worst+'">종합: '+(worst===0?'🟢 아주 좋아요!':worst===1?'🟡 몇 가지만 신경 써요':'🔴 꾸준한 관리가 필요해요')+'</span>';
    h+='<span class="sm-chip g0">양호 '+cnt[0]+'</span>'+(cnt[1]?'<span class="sm-chip g1">주의 '+cnt[1]+'</span>':'')+(cnt[2]?'<span class="sm-chip g2">관리 '+cnt[2]+'</span>':'')+'</div>';
    function cards(list,title){
      let s='<div class="rp-sec">'+title+'</div>';
      list.forEach(x=>{
        const pct=Math.max(4,Math.min(100,(x.gauge!=null?x.gauge:(x.val/x.max))*100));
        const vs=x.fmt?x.fmt(x.val):x.val.toFixed(1)+x.unit;
        s+='<div class="m-card"><div class="m-top"><span class="ic">'+x.ic+'</span><span class="nm">'+x.nm+'</span>'
          +'<span class="m-chip g'+x.g+'">'+GTXT[x.g]+'</span></div>'
          +'<div class="m-val">측정값 <b>'+vs+(x.fmt&&x.unit?x.unit:'')+'</b></div>'
          +'<div class="m-gauge"><i style="width:'+pct+'%;background:'+gcol[x.g]+'"></i></div>'
          +'<div class="m-desc">'+x.d+'</div></div>';
      });
      return s;
    }
    h+=cards(G.frontM,'정면 분석'); h+=cards(G.sideM,'측면 분석');
    h+='<div class="rp-sec">맞춤 운동 처방 ('+rxKeys.length+'가지)</div>';
    rxKeys.forEach(k=>{
      const r=RX[k];
      h+='<div class="rx-card"><div class="rt"><span>'+r.ic+'</span>'+r.nm+'</div><div class="rh">'+r.how+'</div><div class="rd">📌 '+r.dose+'</div>'
        +(r.go?'<button class="rx-go" data-go="'+r.go+'">▶ 지금 바로 하기</button>':'')+'</div>';
    });
    h+='<div class="rp-warn">⚠️ 이 결과는 카메라 기반 <b>참고용 자세 스크리닝</b>이며 의학적 진단이 아니에요. 통증이 있으면 보건 선생님과 상담하세요.</div>';
    h+='<div class="rp-btns"><button class="ghost-btn" id="rpMenu">🏠 놀이터로</button><button class="big-btn" id="rpAgain">다시 측정!</button></div>';
    $('reportBody').innerHTML=h;
    $('rpMenu').onclick=()=>{ $('reportScr').classList.remove('show'); goHub(); };
    $('rpAgain').onclick=()=>{ $('reportScr').classList.remove('show'); openIntro('posture'); };
    document.querySelectorAll('.rx-go').forEach(b=>b.onclick=()=>{ $('reportScr').classList.remove('show'); openIntro(b.dataset.go); });
    running=false; current=null; setHud(false);
    $('reportScr').classList.add('show'); $('reportScr').scrollTop=0;
    cheer(); say(G.score+'점이에요! '+G.band[1]);
  }
  return {
    key:'posture', hud:{timer:true},
    intro:{title:'자세 분석 🧍',desc:'<b>① 정면 4초</b> + <b>② 측면 4초</b> 가만히 서 있으면<br>AI가 자세를 분석해서 점수와 운동을 알려줘요.<br>발끝까지 전신이 보이게 서 주세요.'},
    start(){ G.step='front'; G.buf=[]; G.stableAt=null; G.lastMid=null;
      G.frontM=null; G.sideM=null; G.snapF=null; G.snapS=null; G.procUntil=0;
      $('timerVal').textContent='0%'; },
    end(){},
    frame(lms){
      if(G.step==='done') return;
      const now=performance.now();
      if(G.step==='frontProc'||G.step==='sideProc'){
        if(lms) drawPose(lms,'#C7E8FF');
        ctx.save();
        const cx2=map.W/2, cy2=map.H*0.4, R=Math.min(map.W,map.H)/5;
        ctx.setLineDash([16,12]); ctx.lineDashOffset=-(now/6)%56;
        ctx.strokeStyle='#8FC4E8'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(cx2,cy2,R,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='#4a7a9a'; ctx.font='800 '+Math.max(15,map.W/20)+'px Pretendard'; ctx.textAlign='center';
        const dots='·'.repeat(1+Math.floor(now/380)%3);
        ctx.fillText(G.step==='frontProc'?'정면 분석 중'+dots:'AI가 열심히 분석 중'+dots,cx2,cy2+R+50);
        ctx.restore();
        $('timerVal').textContent='···';
        if(now>=G.procUntil){
          if(G.step==='frontProc'){ G.step='side'; G.buf=[]; G.stableAt=null; G.lastMid=null; beep(660,0.12); setState('좋아요! 이제 옆으로 돌아봐요','#4a7a9a'); }
          else buildReport();
        }
        return;
      }
      if(!lms){ G.buf=[]; G.stableAt=null; setState('전신이 보이게 서 주세요'); $('timerVal').textContent='0%'; return; }
      const core=[11,12,23,24,25,26]; let sum=0; core.forEach(i=>sum+=visOf(lms[i]));
      const ready=sum/core.length>=0.5&&visOf(lms[27])+visOf(lms[28])>0.5;
      drawPose(lms,G.step==='front'?'#8FC4E8':'#B79AE8');
      if(!ready){ G.buf=[]; G.stableAt=null; setState('발끝까지 보이게 뒤로 물러나요'); $('timerVal').textContent='0%'; return; }
      const stance=stanceOf(lms); const want=G.step;
      if(stance!==want){ G.buf=[]; G.stableAt=null; $('timerVal').textContent='0%';
        setState(want==='front'?'카메라를 정면으로 바라봐요':'옆으로 돌아서봐요'); return; }
      const mid={x:(lms[23].x+lms[24].x)/2,y:(lms[23].y+lms[24].y)/2};
      if(G.lastMid){ const mv=Math.hypot(mid.x-G.lastMid.x,(mid.y-G.lastMid.y))*map.vh; if(mv>7){ G.stableAt=null; G.buf=[]; } }
      G.lastMid=mid;
      if(!G.stableAt) G.stableAt=now;
      G.buf.push(IDX.reduce((o,i)=>(o[i]={x:lms[i].x,y:lms[i].y,z:(lms[i].z||0),visibility:visOf(lms[i])},o),{}));
      if(G.buf.length>140) G.buf.shift();
      const held=(now-G.stableAt)/1000;
      const pct=Math.min(100,Math.round(held/HOLD*100));
      $('timerVal').textContent=pct+'%';
      setState(want==='front'?'가만히… 정면 분석 중':'가만히… 측면 분석 중');
      if(held>=HOLD&&G.buf.length>=20){
        const a=avgFrames(G.buf.slice(-60));
        if(want==='front'){ G.frontM=computeFront(a); G.snapF=snapshot(a,'front'); G.step='frontProc'; G.procUntil=now+1500; beep(880,0.2); setState('정면 완료!'); }
        else{ G.sideM=computeSide(a); G.snapS=snapshot(a,'side'); G.step='sideProc'; G.procUntil=now+2000; beep(1040,0.25); setState('측면 완료! 분석 중…'); }
      }
    }
  };
})();

/* ---------- 딥링크 ---------- */
const deep=params.get('g');
if(deep&&GAME[deep]) openIntro(deep);
window.__app={openIntro,startActivity,goHub,GAME,get current(){return current;},get running(){return running;}};
</script>
